<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METAL TRACKER</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<!-- PANTALLA DE LOGIN -->
<div id="login-overlay" class="login-overlay">
    <div class="login-card brutalist-card">
        <h2 class="modal-title">ACCESO RESTRINGIDO</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="username">USUARIO</label>
                <input type="text" id="username" required placeholder="Ingresa tu usuario">
            </div>
            <div class="form-group">
                <label for="password">CONTRASEÑA</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <p id="login-error" class="error-msg hidden">CREDENCIALES INVÁLIDAS</p>
            <div class="modal-actions">
                <button type="submit" class="brutalist-btn" style="width: 100%;">ENTRAR AL VAULT</button>
            </div>
        </form>
    </div>
</div>

<body>
    <header class="brutalist-header">
        <h1>METAL TRACKER // VAULT</h1>

        <!-- Agrupamos los botones aquí -->
        <div class="header-actions">
            <button id="btn-add-album" class="brutalist-btn">AGREGAR ÁLBUM</button>
            <button id="btn-logout" class="brutalist-btn logout-btn">SALIR</button>
        </div>
    </header>

    <!-- BARRA DE BÚSQUEDA Y ORDENAMIENTO -->
    <div class="controls-bar brutalist-card">
        <input type="text" id="search-input" placeholder="BUSCAR POR TÍTULO O BANDA...">
        <select id="sort-select">
            <option value="release_year-desc">MÁS RECIENTES PRIMERO</option>
            <option value="release_year-asc">MÁS ANTIGUOS PRIMERO</option>
            <option value="title-asc">ALFABÉTICO (A-Z)</option>
            <option value="title-desc">ALFABÉTICO (Z-A)</option>
        </select>
    </div>

    <main>
        <section id="albums-grid" class="albums-grid">
            <p class="loading-text">INVOCANDO DESDE EL SERVIDOR...</p>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>

    <!-- MODAL PARA AGREGAR ÁLBUM -->
    <div id="album-modal" class="modal hidden">
        <div class="modal-content brutalist-card">
            <h2 class="modal-title">NUEVO ÁLBUM</h2>
            <form id="add-album-form">
                <div class="form-group">
                    <label for="title">TÍTULO DEL ÁLBUM</label>
                    <input type="text" id="title" required placeholder="Ej. Kostolom">
                </div>

                <div class="form-group">
                    <label for="band_id">BANDA</label>
                    <select id="band_id" required>
                        <option value="">CARGANDO BANDAS...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="release_year">AÑO DE LANZAMIENTO</label>
                    <input type="number" id="release_year" required placeholder="Ej. 2021">
                </div>

                <div class="form-group">
                    <label for="cover">PORTADA (MAX 1MB)</label>
                    <input type="file" id="cover" accept="image/png, image/jpeg, image/webp">
                </div>

                <div class="modal-actions">
                    <button type="submit" class="brutalist-btn">GUARDAR</button>
                    <button type="button" id="btn-close-modal" class="btn-action">CANCELAR</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL DE DETALLES (TRACKLIST Y RATINGS) -->
    <div id="details-modal" class="modal hidden">
        <div class="modal-content brutalist-card details-layout">
            <button type="button" id="btn-close-details" class="btn-action close-corner">X</button>

            <div class="details-header">
                <img id="detail-cover" src="" alt="Cover" class="detail-cover-img">
                <div class="detail-info">
                    <h2 id="detail-title" class="modal-title">Cargando...</h2>
                    <h3 id="detail-band" class="detail-subtitle"></h3>
                    <p id="detail-year"></p>
                </div>
            </div>

            <div class="details-body">
                <div class="tracklist-section">
                    <h3>TRACKLIST</h3>
                    <ul id="detail-tracklist" class="brutalist-list">
                        <!-- Se llenará con JS -->
                    </ul>
                </div>

                <div class="ratings-section">
                    <h3>RESEÑAS</h3>
                    <ul id="detail-ratings" class="brutalist-list">
                        <!-- Se llenará con JS -->
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
